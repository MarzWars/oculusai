<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="pupilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#a78bfa"/>
    <stop offset="100%" style="stop-color:#7c3aed"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1730"/>
    <stop offset="100%" style="stop-color:#0d0b1a"/>
  </linearGradient>
</defs>

<!-- Background rounded square -->
<rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>

<!-- Hex outline -->
<polygon points="100,30 148,56 148,110 100,136 52,110 52,56"
  fill="none" stroke="#3d2d7a" stroke-width="1.2"/>
<polygon points="100,42 138,64 138,100 100,122 62,100 62,64"
  fill="none" stroke="#2d2050" stroke-width="0.8" stroke-dasharray="3,2"/>

<!-- Eye white / iris -->
<ellipse cx="100" cy="83" rx="46" ry="34" fill="#0a0818"/>
<ellipse cx="100" cy="83" rx="40" ry="28" fill="none" stroke="#3d2d7a" stroke-width="0.8"/>

<!-- Pupil -->
<ellipse cx="100" cy="83" rx="22" ry="22" fill="url(#pupilGrad)"/>
<ellipse cx="100" cy="83" rx="14" ry="14" fill="#12093a"/>
<ellipse cx="100" cy="83" rx="7" ry="7" fill="#080514"/>

<!-- Highlight -->
<ellipse cx="92" cy="76" rx="5" ry="4" fill="#ddd6fe" opacity="0.65"/>
<ellipse cx="108" cy="89" rx="2.5" ry="2" fill="#a78bfa" opacity="0.35"/>

<!-- Eyelid lines -->
<path d="M54,83 Q100,44 146,83" fill="none" stroke="#6d28d9" stroke-width="1.8" stroke-linecap="round"/>
<path d="M54,83 Q100,122 146,83" fill="none" stroke="#6d28d9" stroke-width="1.8" stroke-linecap="round"/>

<!-- Corner dots -->
<circle cx="54" cy="83" r="3.5" fill="#7c3aed"/>
<circle cx="146" cy="83" r="3.5" fill="#7c3aed"/>

<!-- Side circuit dots -->
<circle cx="30" cy="83" r="3" fill="#5b21b6"/>
<line x1="54" y1="83" x2="30" y2="83" stroke="#3d2065" stroke-width="1"/>
<circle cx="170" cy="83" r="3" fill="#5b21b6"/>
<line x1="146" y1="83" x2="170" y2="83" stroke="#3d2065" stroke-width="1"/>

<!-- O text below eye -->
<text x="100" y="168" text-anchor="middle"
  font-family="'Segoe UI',system-ui,sans-serif"
  font-size="20" font-weight="700" letter-spacing="5"
  fill="#7c6af7">OCULUS</text>
</svg>
